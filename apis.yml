description: >-
  Mubert is a generative music platform that composes royalty-free tracks
  from millions of artist-contributed samples and loops. The product
  family includes Mubert Render (AI soundtrack generation for content),
  Mubert Studio (contributor program for sample artists), Mubert Play
  (listening app), Mubert Business, and the Mubert API for developers and
  brands embedding generative music into products. Generation supports
  text and image prompts plus controls for genre, mood, BPM, duration,
  and instruments.
apis:
  - aid: mubert:render-api
    name: Mubert Render API
    description: >-
      Developer API that generates royalty-free AI soundtracks tailored to
      a content brief (mood, duration, genre) for embedding into video
      editors, podcast tools, and content platforms.
    humanURL: https://mubert.com/render
    baseURL: https://api-b2b.mubert.com
    tags:
      - Music Generation
      - Text-to-Music
      - Render
      - Royalty-Free
    properties:
      - type: ProductPage
        url: https://mubert.com/render
      - type: Documentation
        url: https://mubert.com/render/api-docs
        title: API documentation (issued to customers)
  - aid: mubert:streaming-api
    name: Mubert Streaming API
    description: >-
      Continuous generative music streaming for apps, games, fitness, and
      ambient experiences. Powers the Mubert Play listening app and is
      exposed to partners through the Mubert API.
    humanURL: https://mubert.com/play
    baseURL: https://api-b2b.mubert.com
    tags:
      - Streaming
      - Generative
      - Ambient
      - Play
    properties:
      - type: ProductPage
        url: https://mubert.com/play
  - aid: mubert:business-api
    name: Mubert Business API
    description: >-
      Commercial-licensing surface for brands and enterprises integrating
      Mubert generative music into products, retail audio, and marketing
      with bespoke licensing terms.
    humanURL: https://mubert.com/business
    baseURL: https://api-b2b.mubert.com
    tags:
      - Business
      - Licensing
      - Brands
      - Enterprise
    properties:
      - type: ProductPage
        url: https://mubert.com/business
