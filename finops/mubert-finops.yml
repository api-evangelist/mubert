specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Mubert
providerId: mubert
publisherName: Mubert
serviceCategory: AI and Machine Learning
serviceSubcategory: Generative Music API
created: '2026-05-25'
modified: '2026-05-25'
tags:
  - AI Music
  - Generative
  - B2B
  - FinOps
  - FOCUS
description: >-
  FinOps Framework alignment for the Mubert AI Music API. Maps Mubert's
  per-license monthly quotas (generated tracks + streaming minutes) and
  Stripe-backed subscription billing into a FOCUS-shaped model so finance and
  engineering teams can allocate, monitor, and optimize generative-music
  spend across products and end-customers.

principles:
  - name: Visibility
    description: Surface monthly generated-tracks and streaming-minute consumption against each license envelope, with webhook-driven near-real-time signal.
  - name: Allocation
    description: Tag each generated track and stream session with custom_id (your end-user) so cost can be attributed back to product, feature, and customer.
  - name: Optimization
    description: Prefer track-store reuse, library tracks, and lower bitrates for cost-insensitive paths; reserve high-intensity / 320 kbps WAV for premium experiences.
  - name: Accountability
    description: Establish per-license budget owners and chargeback / showback to consuming product teams.

billingModel:
  type: subscription
  cadence: monthly
  paymentProcessor: Stripe
  entitlements:
    - Generated tracks per month (license limit)
    - Streaming minutes per month (license limit)
    - Allowed formats / bitrates / intensities / modes
    - Optional features (image prompt, stem editing, library, recording)
  notes:
    - Subscriptions are purchased and cancelled via /api/v3/public/subscriptions/* (customer self-service) or /api/v3/service/stripe/subscriptions/* (company-managed).
    - License `customer_limits` lets companies subdivide a license quota across multiple end-customers.

domains:
  - name: Generation
    description: Per-track AI generation consumption.
    costDrivers:
      - generated_tracks_count
      - duration_seconds
      - bitrate
      - format
      - intensity
    focusMapping:
      ChargeCategory: Usage
      ChargeClass: Consumption
      ServiceCategory: AI and Machine Learning
      ServiceSubcategory: Generative Music API
      PricingUnit: track

  - name: Streaming
    description: Continuous generative streaming consumption.
    costDrivers:
      - streaming_minutes
      - intensity
      - bitrate
    focusMapping:
      ChargeCategory: Usage
      ChargeClass: Consumption
      ServiceCategory: AI and Machine Learning
      ServiceSubcategory: Generative Music API
      PricingUnit: minute

  - name: Subscription
    description: Flat-rate monthly platform fee gating quotas and features.
    focusMapping:
      ChargeCategory: Purchase
      ChargeClass: Committed
      PricingCategory: Standard
      PricingUnit: month

focusFields:
  required:
    - BillingPeriodStart
    - BillingPeriodEnd
    - ChargeCategory
    - ChargePeriodStart
    - ChargePeriodEnd
    - ProviderName
    - PublisherName
    - InvoiceIssuerName
    - ServiceName
    - ServiceCategory
    - BilledCost
    - EffectiveCost
    - ListCost
    - ContractedCost
    - PricingCategory
    - PricingUnit
    - PricingQuantity
  recommended:
    - SubAccountId
    - SubAccountName
    - ResourceId
    - ResourceName
    - ResourceType
    - Region
    - Tags

notes:
  - Mubert invoices originate from Stripe; reconcile FOCUS fields against the Stripe invoice payload delivered to your webhook endpoint.
  - License `track_expiration_time` is a cost-control lever — shorter expirations reduce sub-licensing exposure.
